<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
    <style>
      .block { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .entry { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
      .exit { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .edge { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .label { font-family: Liberation Sans, Arial, sans-serif; font-size: 15px; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .text { font-family: Liberation Sans, Arial, sans-serif; font-size: 17px; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 14px; }
      .title { font-size: 22px; font-weight: bold; }
    </style>
  </defs>

  <text x="460" y="28" class="text title">Control-flow graph for function max</text>

  <rect x="350" y="55" width="220" height="70" rx="8" class="entry"/>
  <text x="460" y="82" class="text">B0: entry</text>
  <text x="460" y="105" class="text small">result = a</text>

  <rect x="350" y="170" width="220" height="75" rx="8" class="block"/>
  <text x="460" y="198" class="text">B1: condition</text>
  <text x="460" y="221" class="text small">b &gt; result ?</text>

  <rect x="95" y="315" width="230" height="75" rx="8" class="block"/>
  <text x="210" y="343" class="text">B2: then</text>
  <text x="210" y="366" class="text small">result = b</text>

  <rect x="595" y="315" width="230" height="75" rx="8" class="block"/>
  <text x="710" y="343" class="text">B3: return</text>
  <text x="710" y="366" class="text small">return result</text>

  <rect x="600" y="455" width="220" height="60" rx="8" class="exit"/>
  <text x="710" y="485" class="text">B4: exit</text>

  <path d="M460 125 L460 170" class="edge"/>
  <path d="M405 245 C335 275 270 295 210 315" class="edge"/>
  <path d="M515 245 C580 275 645 295 710 315" class="edge"/>
  <path d="M325 352 C430 352 500 352 595 352" class="edge"/>
  <path d="M710 390 L710 455" class="edge"/>

  <text x="318" y="276" class="label">true</text>
  <text x="604" y="276" class="label">false</text>
  <text x="462" y="335" class="label">join</text>
</svg>
