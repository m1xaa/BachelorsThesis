<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <style>
      .node { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .leaf { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; }
      .edge { stroke: #374151; stroke-width: 2; fill: none; }
      .text { font-family: Liberation Sans, Arial, sans-serif; font-size: 17px; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 14px; }
      .title { font-size: 22px; font-weight: bold; }
    </style>
  </defs>

  <text x="450" y="28" class="text title">Simplified AST for function max</text>

  <line x1="450" y1="80" x2="260" y2="155" class="edge"/>
  <line x1="450" y1="80" x2="450" y2="155" class="edge"/>
  <line x1="450" y1="80" x2="640" y2="155" class="edge"/>
  <rect x="365" y="55" width="170" height="50" rx="8" class="node"/>
  <text x="450" y="81" class="text">Program</text>

  <rect x="155" y="135" width="210" height="55" rx="8" class="node"/>
  <text x="260" y="162" class="text">FunctionDecl</text>
  <text x="260" y="180" class="text small">name: max</text>

  <rect x="380" y="135" width="140" height="55" rx="8" class="leaf"/>
  <text x="450" y="162" class="text">Params</text>
  <text x="450" y="180" class="text small">a, b</text>

  <rect x="560" y="135" width="160" height="55" rx="8" class="node"/>
  <text x="640" y="162" class="text">BlockStmt</text>

  <line x1="640" y1="190" x2="220" y2="270" class="edge"/>
  <line x1="640" y1="190" x2="450" y2="270" class="edge"/>
  <line x1="640" y1="190" x2="690" y2="270" class="edge"/>

  <rect x="105" y="250" width="230" height="55" rx="8" class="node"/>
  <text x="220" y="276" class="text">VariableDecl</text>
  <text x="220" y="294" class="text small">let result = a</text>

  <rect x="350" y="250" width="200" height="55" rx="8" class="node"/>
  <text x="450" y="276" class="text">IfStmt</text>

  <rect x="590" y="250" width="200" height="55" rx="8" class="node"/>
  <text x="690" y="276" class="text">ReturnStmt</text>
  <text x="690" y="294" class="text small">return result</text>

  <line x1="450" y1="305" x2="280" y2="390" class="edge"/>
  <line x1="450" y1="305" x2="450" y2="390" class="edge"/>
  <line x1="450" y1="305" x2="620" y2="390" class="edge"/>

  <rect x="160" y="370" width="240" height="55" rx="8" class="node"/>
  <text x="280" y="396" class="text">BinaryExpr</text>
  <text x="280" y="414" class="text small">b &gt; result</text>

  <rect x="355" y="370" width="190" height="55" rx="8" class="node"/>
  <text x="450" y="396" class="text">ThenBlock</text>

  <rect x="535" y="370" width="170" height="55" rx="8" class="leaf"/>
  <text x="620" y="396" class="text">NoElse</text>

  <line x1="450" y1="425" x2="450" y2="495" class="edge"/>

  <rect x="330" y="475" width="240" height="55" rx="8" class="node"/>
  <text x="450" y="501" class="text">AssignmentExpr</text>
  <text x="450" y="519" class="text small">result = b</text>
</svg>
