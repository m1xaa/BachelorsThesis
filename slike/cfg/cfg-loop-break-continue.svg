<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
    <style>
      .block { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .cond { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; }
      .target { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .note { fill: #f9fafb; stroke: #6b7280; stroke-width: 1.5; }
      .arrow { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
      .text { font-family: Liberation Sans, Arial, sans-serif; font-size: 18px; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 14px; }
      .title { font-size: 24px; font-weight: bold; }
    </style>
  </defs>

  <text x="540" y="34" class="text title">Циљеви `break` и `continue` наредби у петљи</text>

  <rect x="410" y="70" width="260" height="70" rx="8" class="block"/>
  <text x="540" y="98" class="text">блок пре петље</text>
  <text x="540" y="121" class="text small">прелаз на услов петље</text>

  <rect x="410" y="185" width="260" height="90" rx="8" class="cond"/>
  <text x="540" y="218" class="text">услов петље</text>
  <text x="540" y="244" class="text small">тачно: тело, нетачно: излаз</text>

  <rect x="110" y="330" width="290" height="120" rx="8" class="block"/>
  <text x="255" y="360" class="text">тело петље</text>
  <text x="255" y="388" class="text small">нормалан крај: наставак итерације</text>
  <text x="255" y="413" class="text small">`continue`: прескочи остатак тела</text>
  <text x="255" y="438" class="text small">`break`: излаз из петље</text>

  <rect x="410" y="495" width="260" height="80" rx="8" class="target"/>
  <text x="540" y="525" class="text">continue_target</text>
  <text x="540" y="550" class="text small">while: услов, for: update блок</text>

  <rect x="735" y="330" width="260" height="120" rx="8" class="target"/>
  <text x="865" y="365" class="text">break_target</text>
  <text x="865" y="392" class="text small">код после петље</text>
  <text x="865" y="420" class="text small">уједно излаз када је услов нетачан</text>

  <path d="M540 140 L540 185" class="arrow"/>
  <path d="M475 275 C410 305 340 322 255 330" class="arrow"/>
  <path d="M605 275 C675 305 760 315 865 330" class="arrow"/>
  <path d="M290 450 C330 505 405 520 410 535" class="arrow"/>
  <path d="M540 495 C540 430 540 340 540 275" class="arrow"/>
  <path d="M400 390 C520 390 610 390 735 390" class="arrow dash"/>

  <rect x="318" y="284" width="72" height="26" rx="5" class="note"/>
  <text x="354" y="298" class="text small">тачно</text>

  <rect x="690" y="284" width="82" height="26" rx="5" class="note"/>
  <text x="731" y="298" class="text small">нетачно</text>

  <rect x="525" y="358" width="70" height="26" rx="5" class="note"/>
  <text x="560" y="372" class="text small">break</text>

  <rect x="338" y="475" width="145" height="26" rx="5" class="note"/>
  <text x="410" y="489" class="text small">нормално/continue</text>
</svg>
