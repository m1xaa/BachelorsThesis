<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/>
    </marker>
    <style>
      .block { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .cond { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; }
      .target { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .label-bg { fill: #ffffff; stroke: #d1d5db; stroke-width: 1; }
      .arrow { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
      .text { font-family: Liberation Sans, Arial, sans-serif; font-size: 18px; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 14px; }
      .title { font-size: 24px; font-weight: bold; }
    </style>
  </defs>

  <text x="540" y="34" class="text title">Loop targets for break and continue</text>

  <rect x="70" y="115" width="230" height="82" rx="8" class="block"/>
  <text x="185" y="146" class="text">Before loop</text>
  <text x="185" y="171" class="text small">enters the loop header</text>

  <rect x="415" y="105" width="250" height="102" rx="8" class="cond"/>
  <text x="540" y="141" class="text">Loop condition</text>
  <text x="540" y="168" class="text small">true: body</text>
  <text x="540" y="190" class="text small">false: after loop</text>

  <rect x="415" y="295" width="250" height="112" rx="8" class="block"/>
  <text x="540" y="327" class="text">Loop body</text>
  <text x="540" y="354" class="text small">ordinary statements</text>
  <text x="540" y="377" class="text small">break / continue may appear here</text>

  <rect x="415" y="500" width="250" height="82" rx="8" class="target"/>
  <text x="540" y="531" class="text">continue target</text>
  <text x="540" y="556" class="text small">for: update, while: condition</text>

  <rect x="780" y="295" width="240" height="112" rx="8" class="target"/>
  <text x="900" y="331" class="text">break target</text>
  <text x="900" y="358" class="text small">first block after loop</text>
  <text x="900" y="381" class="text small">also used by false condition</text>

  <path d="M300 156 L415 156" class="arrow"/>
  <path d="M540 207 L540 295" class="arrow"/>
  <path d="M665 156 L900 156 L900 295" class="arrow"/>
  <path d="M665 351 L780 351" class="arrow dash"/>
  <path d="M540 407 L540 500" class="arrow"/>
  <path d="M415 541 L350 541 L350 235 L465 235 L465 207" class="arrow"/>

  <rect x="511" y="241" width="58" height="26" rx="5" class="label-bg"/>
  <text x="540" y="255" class="text small">true</text>

  <rect x="724" y="137" width="62" height="26" rx="5" class="label-bg"/>
  <text x="755" y="151" class="text small">false</text>

  <rect x="697" y="331" width="60" height="26" rx="5" class="label-bg"/>
  <text x="727" y="345" class="text small">break</text>

  <rect x="486" y="445" width="108" height="26" rx="5" class="label-bg"/>
  <text x="540" y="459" class="text small">continue</text>

  <rect x="292" y="430" width="116" height="26" rx="5" class="label-bg"/>
  <text x="350" y="444" class="text small">next iteration</text>
</svg>
